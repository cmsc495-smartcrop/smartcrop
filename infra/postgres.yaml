apiVersion: v1
kind: Pod
metadata:
  name: smartcrop-postgres
  labels:
    app: postgres
spec:
  containers:
    - name: postgres
      image: docker.io/library/postgres:16-alpine
      env:
        - name: POSTGRES_USER
          value: smartcrop
        - name: POSTGRES_PASSWORD
          value: smartcrop
        - name: POSTGRES_DB
          value: smartcrop
      ports:
        - containerPort: 5432
          hostPort: 5432
      volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql/data
  volumes:
    - name: pgdata
      persistentVolumeClaim:
        claimName: smartcrop-pgdata
